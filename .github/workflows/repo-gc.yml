name: Repo GC

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

jobs:
  gc:
    name: Entropy + Docs Freshness
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run docs:contracts
      - run: npm run entropy:check
