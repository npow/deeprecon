services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  cliproxy:
    build:
      context: .
      dockerfile: Dockerfile.cliproxy
    restart: unless-stopped
    volumes:
      - ./cliproxyapi.conf:/home/cliproxy/.config/cliproxyapi.conf:ro
      - ${HOME}/.cli-proxy-api:/home/cliproxy/.cli-proxy-api:ro
    expose:
      - "8317"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8317/"]
      interval: 30s
      timeout: 5s
      start_period: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      cliproxy:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - CLIPROXY_URL=http://cliproxy:8317
      - CLIPROXY_API_KEY=${CLIPROXY_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - PGHOST=${PGHOST}
      - PGPORT=${PGPORT:-5432}
      - PGUSER=${PGUSER}
      - PGPASSWORD=${PGPASSWORD}
      - PGDATABASE=${PGDATABASE:-postgres}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - SCAN_REDIS_PREFIX=${SCAN_REDIS_PREFIX:-deeprecon}
    volumes:
      - app-data:/app/data
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  app-data:
  redis-data:
  caddy-data:
  caddy-config:
